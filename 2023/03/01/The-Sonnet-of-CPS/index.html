  document.body.classList.add('mobile')
}</script><div><div class="inner"><h2>The Sonnet of CPS</h2><p>This is derived from a CPSed interpreter.<br>If you understand so called 2-level lambda notations (in Olivier Danvy’s old papers), then it’s trivial.</p>
<figure class="highlight scheme"><table><tr><td class="code"><pre><span class="line">(<span class="name"><span class="built_in">define</span></span> cps</span><br><span class="line">  (<span class="name">λ</span> (<span class="name">expr</span> C)</span><br><span class="line">    (<span class="name">match</span> expr</span><br><span class="line">      [(<span class="name">?</span> symbol? x) (<span class="name">C</span> x)]</span><br><span class="line">      [`(λ (,x) ,body)</span><br><span class="line">       (<span class="name">C</span> `(λ (,x k) ,(cps body (λ (v) `(k ,v)))))]</span><br><span class="line">      [`(,rator ,rand)</span><br><span class="line">       (<span class="name">cps</span> rator</span><br><span class="line">          (<span class="name">λ</span> (<span class="name">v₀</span>)</span><br><span class="line">            (<span class="name">cps</span> rand</span><br><span class="line">               (<span class="name">λ</span> (<span class="name">v₁</span>)</span><br><span class="line">                 (<span class="name"><span class="built_in">let</span></span> ([<span class="name">v</span> (<span class="name">gensym</span> <span class="symbol">&#x27;v</span>)])</span><br><span class="line">                   `(,v₀ ,v₁</span><br><span class="line">                         (λ (,v) ,(C v))))))))]))) </span><br></pre></td></tr></table></figure>
